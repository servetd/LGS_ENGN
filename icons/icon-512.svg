<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b61ff"/>
      <stop offset="60%" stop-color="#5b2a86"/>
      <stop offset="100%" stop-color="#1b1746"/>
    </linearGradient>
    <linearGradient id="rk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffce47"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <radialGradient id="fl" cx="0.5" cy="0.2" r="0.8">
      <stop offset="0%" stop-color="#ffe27a"/>
      <stop offset="60%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#ff6b9d00"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- yıldızlar -->
  <g fill="#ffce47" opacity="0.6">
    <circle cx="80"  cy="100" r="3"/>
    <circle cx="430" cy="80"  r="2"/>
    <circle cx="60"  cy="380" r="2.5"/>
    <circle cx="450" cy="420" r="3"/>
    <circle cx="120" cy="250" r="2"/>
    <circle cx="390" cy="220" r="2"/>
  </g>
  <!-- alev -->
  <ellipse cx="256" cy="400" rx="60" ry="100" fill="url(#fl)"/>
  <!-- roket gövdesi -->
  <path d="M256 110
           C 320 160, 340 240, 320 340
           L 192 340
           C 172 240, 192 160, 256 110 Z"
        fill="url(#rk)" stroke="#fff" stroke-width="6" stroke-linejoin="round"/>
  <!-- pencere -->
  <circle cx="256" cy="220" r="32" fill="#1b1746" stroke="#fff" stroke-width="6"/>
  <circle cx="246" cy="210" r="10" fill="#ffce47" opacity="0.7"/>
  <!-- yan kanatlar -->
  <path d="M192 290 L 150 360 L 192 340 Z" fill="#ff6b9d" stroke="#fff" stroke-width="6" stroke-linejoin="round"/>
  <path d="M320 290 L 362 360 L 320 340 Z" fill="#ff6b9d" stroke="#fff" stroke-width="6" stroke-linejoin="round"/>
</svg>
